{% extends "base.html" %}{% block body %}<div class="p-6"><h1 class="text-2xl font-bold">Templates</h1><form method="post" action="/templates" class="card mt-6"><div><label>Name</label><input name="name" class="input"></div><div class="mt-3"><label>Content</label><textarea name="content" class="textarea"></textarea></div><button class="btn mt-4">Create Template</button></form><div class="card mt-6">{% for t in templates_list %}<div class="item"><strong>#{{ t.id }}</strong> {{ t.name }} <a href="/templates/delete/{{ t.id }}">Delete</a></div>{% else %}<div class="muted">No templates</div>{% endfor %}</div></div>{% endblock %}
