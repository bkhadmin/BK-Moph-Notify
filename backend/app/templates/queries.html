{% extends "base.html" %}{% block body %}<div class="p-6"><h1 class="text-2xl font-bold">Approved Queries</h1><form method="post" action="/queries" class="card mt-6"><div><label>Name</label><input name="name" class="input"></div><div class="mt-3"><label>SQL</label><textarea name="sql_text" class="textarea"></textarea></div><button class="btn mt-4">Create Query</button></form><div class="card mt-6">{% for q in queries %}<div class="item"><strong>#{{ q.id }}</strong> {{ q.name }} <a href="/queries/delete/{{ q.id }}">Delete</a></div>{% else %}<div class="muted">No queries</div>{% endfor %}</div></div>{% endblock %}
