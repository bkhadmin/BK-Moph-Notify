{% extends "base.html" %}
{% block body %}
<div class="page-header">
  <h1 class="page-title">MOPH Notify Test</h1>
</div>

<div class="grid-2 mt-6">
  <form method="post" action="/notify/flex-builder" class="card">
    <h3>Flex Builder</h3>
    <div class="mt-3"><label>Title</label><input class="input" name="title"></div>
    <div class="mt-3"><label>Body</label><textarea class="textarea" name="body_text"></textarea></div>
    <button class="btn mt-4">Generate Flex</button>
  </form>

  <div class="card">
    <h3>Flex Preview</h3>
    <div id="flex-preview"></div>
  </div>
</div>

<div class="card mt-6">
  <h3>Flex JSON</h3>
  <textarea id="flex-json" class="textarea" name="flex_json" rows="16">{{ flex_json or '' }}</textarea>
  <div class="page-actions mt-3">
    <button type="button" class="btn secondary" onclick="renderFlexPreview('flex-json','flex-preview')">Preview</button>
    <form method="post" action="/notify/send-flex">
      <input type="hidden" name="flex_json" id="flex-json-hidden">
      <button class="btn">Send Flex</button>
    </form>
  </div>
</div>

<script src="/static/js/flex_preview.js"></script>
<script>
document.querySelector('form[action="/notify/send-flex"]').addEventListener("submit",function(){
 document.getElementById("flex-json-hidden").value=document.getElementById("flex-json").value
})
</script>

{% endblock %}
