{% extends "base.html" %}
{% block body %}
<div class="p-6">
  <h1 class="text-2xl font-bold">Reports Dashboard</h1>
  <div class="grid grid-cols-1 gap-4 md:grid-cols-3 mt-6">
    {% for key, value in summary.items() %}
    <div class="card">
      <div class="muted">{{ key }}</div>
      <div class="metric">{{ value }}</div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
