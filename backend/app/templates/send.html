{% extends "base.html" %}{% block body %}<div class="p-6"><h1 class="text-2xl font-bold">Send / Preview</h1><form method="post" action="/send" class="card mt-6"><div><label>Name</label><input name="name" value="User" class="input"></div><div class="mt-3"><label>Template</label><textarea name="template" class="textarea">Hello {name}</textarea></div><button class="btn mt-4">Preview</button></form>{% if result %}<div class="card mt-6"><div class="muted">Preview Result</div><div class="mt-3">{{ result }}</div></div>{% endif %}</div>{% endblock %}
